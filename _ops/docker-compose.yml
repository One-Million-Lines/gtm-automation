version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: _ops/Dockerfile.backend
    container_name: gtm-api
    restart: unless-stopped
    env_file:
      - ../backend/.env
    volumes:
      - ../backend/data:/app/data
      - ../backend/logs:/app/logs
    expose:
      - "5220"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5220/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: _ops/Dockerfile.frontend
      args:
        VITE_API_BASE: /api
    container_name: gtm-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

# nginx site for GTM Automation
# Place at /etc/nginx/sites-available/gtm-automation and symlink into sites-enabled.
# Adjust server_name + TLS paths as needed.

upstream gtm_api {
    server 127.0.0.1:5220;
    keepalive 32;
}

server {
    listen 80;
    server_name gtm.example.com;

    # Redirect all HTTP to HTTPS once certs are installed (uncomment):
    # return 301 https://$host$request_uri;

    client_max_body_size 25m;

    # Static built frontend (Vite output copied here)
    root /var/www/gtm-automation/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass         http://gtm_api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    access_log /var/log/nginx/gtm-access.log;
    error_log  /var/log/nginx/gtm-error.log;
}

